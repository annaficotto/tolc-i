<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logica Mentor - Accesso</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Mentor di Logica</h1>
        <div class="auth-tabs">
            <button class="tab-btn active" id="tabLogin">Accedi</button>
            <button class="tab-btn" id="tabReg">Registrati</button>
        </div>

        <!-- Login form -->
        <form id="loginForm" class="auth-form">
            <h2>Accedi</h2>
            <input type="text" id="loginUsername" placeholder="Username" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit">Entra</button>
            <p id="loginError" class="error"></p>
        </form>

        <!-- Registration form -->
        <form id="regForm" class="auth-form hidden">
            <h2>Registrati</h2>
            <input type="text" id="regUsername" placeholder="Username" required>
            <input type="password" id="regPassword" placeholder="Password" required>
            <input type="password" id="regConfirm" placeholder="Conferma password" required>
            <button type="submit">Crea account</button>
            <p id="regError" class="error"></p>
        </form>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // UI switching
        document.getElementById('tabLogin').addEventListener('click', () => {
            document.getElementById('tabLogin').classList.add('active');
            document.getElementById('tabReg').classList.remove('active');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('regForm').classList.add('hidden');
        });
        document.getElementById('tabReg').addEventListener('click', () => {
            document.getElementById('tabReg').classList.add('active');
            document.getElementById('tabLogin').classList.remove('active');
            document.getElementById('regForm').classList.remove('hidden');
            document.getElementById('loginForm').classList.add('hidden');
        });

        // Login submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            try {
                const success = await login(username, password);
                if (success) {
                    window.location.href = 'app.html';
                } else {
                    errorEl.textContent = 'Username o password errati.';
                }
            } catch (err) {
                errorEl.textContent = 'Errore: ' + err.message;
            }
        });

        // Registration submission
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            const errorEl = document.getElementById('regError');
            if (password !== confirm) {
                errorEl.textContent = 'Le password non coincidono.';
                return;
            }
            try {
                const success = await register(username, password);
                if (success) {
                    // Auto-login after registration
                    await login(username, password);
                    window.location.href = 'app.html';
                } else {
                    errorEl.textContent = 'Username già esistente.';
                }
            } catch (err) {
                errorEl.textContent = 'Errore: ' + err.message;
            }
        });
    </script>
</body>
</html>
