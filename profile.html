<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOLC Trainer — Profilo</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="dashboard.html" class="navbar-brand">
                <span class="bracket">[</span>TOLC<span class="bracket">]</span>
            </a>
            <div class="navbar-actions">
                <span class="text-sm text-mono text-muted" id="nav-username"></span>
                <a href="dashboard.html" class="btn btn-ghost text-sm">← Dashboard</a>
                <button class="theme-toggle" id="theme-toggle" title="Cambia tema">☀</button>
                <button class="btn btn-outline text-sm" id="btn-logout">Esci</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="alert" id="profile-alert" style="margin-top:1rem"></div>
    </div>

    <main class="container fade-in" style="padding-top:2rem;padding-bottom:4rem">
        <div class="flex-between mb-lg">
            <div>
                <h1>👤 <span id="profile-username">—</span></h1>
                <p class="text-sm text-muted mt-sm">Account creato il <span id="profile-created">—</span></p>
            </div>
            <div class="flex gap-sm">
                <button class="btn btn-outline" id="btn-reset-errors">🗑 Reset errori</button>
                <button class="btn btn-outline" id="btn-change-password">🔑 Cambia password</button>
                <button class="btn btn-outline" id="btn-reset-progress">↺ Reset progresso</button>
                <button class="btn btn-danger" id="btn-delete-account">✕ Elimina account</button>
            </div>
        </div>

        <div class="card card-accent mb-lg">
            <h3 class="mb-md">📊 Statistiche globali</h3>
            <div class="stat-grid">
                <div class="stat-item">
                    <div class="stat-value text-accent" id="stat-total">0</div>
                    <div class="stat-label">Totale risp.</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color:var(--success)" id="stat-correct">0</div>
                    <div class="stat-label">Corrette</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color:var(--danger)" id="stat-wrong">0</div>
                    <div class="stat-label">Errate</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value text-accent" id="stat-pct">0%</div>
                    <div class="stat-label">Precisione</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" style="color:var(--warn)" id="stat-errors">0</div>
                    <div class="stat-label">Errori totali</div>
                </div>
            </div>
            <div class="mt-md">
                <div class="flex-between mb-sm"><span class="text-sm text-muted">Precisione globale</span><span
                        class="text-sm text-mono text-accent" id="stat-pct-label">0%</span></div>
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" id="stat-progress-bar" style="width:0%"></div>
                </div>
            </div>
        </div>

        <div class="card mb-lg">
            <h3 class="mb-md">❌ Errori per materia</h3>
            <div id="error-categories">
                <div class="spinner"></div>
            </div>
        </div>

        <div class="card">
            <h3 class="mb-md">📅 Ultime sessioni</h3>
            <div id="session-history">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <!-- Modali invariati (stessi di prima) -->
    <div class="modal-overlay" id="modal-reset-progress">...</div>
    <div class="modal-overlay" id="modal-change-password">...</div>
    <div class="modal-overlay" id="modal-delete-account">...</div>

    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggle = document.getElementById('theme-toggle');
            if (toggle) toggle.textContent = document.body.classList.contains('light') ? '☾' : '☀';
            const pctEl = document.getElementById('stat-pct');
            const pctLabel = document.getElementById('stat-pct-label');
            if (pctEl && pctLabel) {
                new MutationObserver(() => pctLabel.textContent = pctEl.textContent).observe(pctEl, { childList: true, characterData: true, subtree: true });
            }
        });
    </script>
</body>

</html>
